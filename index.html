<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직업상담 음성 분석 보조 툴</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --ink: #1f2a37;
      --sub: #5d6b7f;
      --line: #d5dfea;
      --accent: #0d6c63;
      --accent-2: #0a544d;
      --soft: #edf3fb;
      --ok: #0d7d43;
      --warn: #a36500;
      --high: #b8322a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans KR", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 20px;
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 16px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(18, 40, 66, 0.06);
    }

    .head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(140deg, #eaf5f2, #f7fafc);
    }

    h1, h2 { margin: 0; }
    h1 { font-size: 1.22rem; }
    h2 { font-size: 1.05rem; }

    .desc {
      margin: 6px 0 0;
      color: var(--sub);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 0.9rem;
      font-weight: 700;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      color: inherit;
      outline: none;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 110px; }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(13, 108, 99, 0.12);
    }

    .full { grid-column: 1 / -1; }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }

    .primary { background: var(--accent); color: #fff; }
    .primary:hover { background: var(--accent-2); }
    .ghost { background: var(--soft); color: #26384f; }

    .status {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fbfdff;
      font-size: 0.88rem;
      color: var(--sub);
      line-height: 1.4;
    }

    .pill {
      display: inline-block;
      margin-top: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .low { background: #eaf8ef; color: var(--ok); }
    .mid { background: #fff5e8; color: var(--warn); }
    .high { background: #fdeeee; color: var(--high); }

    .mini {
      font-size: 0.82rem;
      color: var(--sub);
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="head">
        <h1>정부 고용지원 현장용 직업상담 음성 분석 보조 툴</h1>
        <p class="desc">긴 상담 음성을 받아 핵심 토픽, 불안도/감정상태, 지원 니즈를 분석하고 상담일지 초안을 자동 생성합니다.</p>
      </div>

      <div class="body">
        <div class="grid">
          <div class="field">
            <label for="sessionDate">상담일자</label>
            <input id="sessionDate" type="date" />
          </div>
          <div class="field">
            <label for="clientCode">내담자 코드</label>
            <input id="clientCode" placeholder="예: EMP-2026-0031" />
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="uploadBtn">파일 업로드 분석</button>
          <button class="primary" id="recordBtn">실시간 녹음 시작</button>
          <input id="audioFile" type="file" accept="audio/*" hidden />
        </div>

        <div class="status" id="statusBox">
          상태: 대기 중
          <br />안내: 분석 데이터는 브라우저 메모리에서만 처리되며 외부 DB에 저장하지 않습니다.
        </div>

        <div class="field">
          <label for="transcript">음성 변환 텍스트 (수정 가능)</label>
          <textarea id="transcript" placeholder="음성 분석 후 자동 입력됩니다."></textarea>
        </div>

        <div class="toolbar">
          <button class="ghost" id="reanalyzeBtn">텍스트 재분석</button>
          <button class="ghost" id="sampleBtn">샘플 텍스트</button>
          <button class="ghost" id="resetBtn">초기화</button>
        </div>

        <p class="mini">참고: 최초 1회는 로컬 음성모델(Whisper tiny) 로딩으로 시간이 걸릴 수 있습니다.</p>
      </div>
    </section>

    <section class="panel">
      <div class="head">
        <h2>분석 결과 및 상담 일지</h2>
        <p class="desc">아래 항목은 모두 직접 수정할 수 있습니다.</p>
      </div>

      <div class="body">
        <div class="field">
          <label for="topicOut">주요 진로 토픽</label>
          <textarea id="topicOut" placeholder="예: 희망직종, 경력전환 고민, 취업준비 이슈"></textarea>
        </div>

        <div class="field">
          <label for="emotionOut">불안도 / 감정 상태</label>
          <textarea id="emotionOut" placeholder="예: 불안도 보통(52/100), 혼란감 존재"></textarea>
          <div id="anxietyBadge"></div>
        </div>

        <div class="field">
          <label for="needsOut">지원 니즈</label>
          <textarea id="needsOut" placeholder="예: 취업알선, 직업훈련, 심리지원"></textarea>
        </div>

        <div class="field">
          <label for="journalOut">상담 일지 자동 요약 (수정 가능)</label>
          <textarea id="journalOut" style="min-height: 210px;" placeholder="자동 생성 결과가 표시됩니다."></textarea>
        </div>

        <div class="actions">
          <button class="ghost" id="copyBtn">복사하기</button>
          <button class="ghost" id="downloadBtn">TXT 다운로드</button>
          <button class="ghost" id="printBtn">PDF로 저장(인쇄)</button>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

    env.allowLocalModels = false;

    const $ = (id) => document.getElementById(id);

    const ids = {
      sessionDate: $("sessionDate"),
      clientCode: $("clientCode"),
      uploadBtn: $("uploadBtn"),
      recordBtn: $("recordBtn"),
      audioFile: $("audioFile"),
      statusBox: $("statusBox"),
      transcript: $("transcript"),
      reanalyzeBtn: $("reanalyzeBtn"),
      sampleBtn: $("sampleBtn"),
      resetBtn: $("resetBtn"),
      topicOut: $("topicOut"),
      emotionOut: $("emotionOut"),
      needsOut: $("needsOut"),
      journalOut: $("journalOut"),
      anxietyBadge: $("anxietyBadge"),
      copyBtn: $("copyBtn"),
      downloadBtn: $("downloadBtn"),
      printBtn: $("printBtn")
    };

    const TOPIC_RULES = [
      { key: "희망직종/직업군", words: ["희망", "직종", "직무", "직업", "분야", "업무"] },
      { key: "진로결정 고민", words: ["결정", "선택", "진로", "갈등", "방향", "고민"] },
      { key: "경력전환/이직", words: ["이직", "전환", "경력", "퇴사", "재취업"] },
      { key: "취업준비", words: ["이력서", "자소서", "면접", "채용", "지원", "포트폴리오"] },
      { key: "역량개발", words: ["자격증", "훈련", "교육", "학습", "기술", "역량"] },
      { key: "제약요인", words: ["가족", "건강", "경제", "시간", "거리", "돌봄"] }
    ];

    const NEED_RULES = [
      { key: "취업 알선/매칭", words: ["채용", "알선", "연계", "구인", "지원처"] },
      { key: "직업훈련/역량강화", words: ["훈련", "교육", "자격증", "기술", "배우"] },
      { key: "구직기술 코칭", words: ["이력서", "자소서", "면접", "포트폴리오"] },
      { key: "진로탐색/정보제공", words: ["직업정보", "탐색", "직무", "비교", "시장"] },
      { key: "심리·정서 지원", words: ["불안", "우울", "스트레스", "두렵", "자신없"] }
    ];

    const POSITIVE = ["가능", "기대", "의욕", "준비", "괜찮", "자신", "희망", "성장"];
    const NEGATIVE = ["불안", "걱정", "막막", "두렵", "자신없", "스트레스", "우울", "압박", "포기", "혼란"];

    let asrPromise = null;
    let recorder = null;
    let recordChunks = [];
    let recordStream = null;
    let isRecording = false;

    function setStatus(message) {
      ids.statusBox.innerHTML = `상태: ${message}<br />안내: 분석 데이터는 브라우저 메모리에서만 처리되며 외부 DB에 저장하지 않습니다.`;
    }

    function todayLocal() {
      return new Date().toISOString().slice(0, 10);
    }

    function includesStem(text, stem) {
      return text.toLowerCase().includes(stem);
    }

    function splitSentences(text) {
      return text
        .split(/(?<=[.!?\n])\s+|\n+/)
        .map((s) => s.trim())
        .filter((s) => s.length > 0);
    }

    function pickTopics(text) {
      const scored = TOPIC_RULES.map((rule) => {
        let score = 0;
        for (const w of rule.words) {
          if (includesStem(text, w)) score += 1;
        }
        return { key: rule.key, score };
      })
      .filter((x) => x.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 5);

      return scored;
    }

    function pickNeeds(text) {
      const scored = NEED_RULES.map((rule) => {
        let score = 0;
        for (const w of rule.words) {
          if (includesStem(text, w)) score += 1;
        }
        return { key: rule.key, score };
      })
      .filter((x) => x.score > 0)
      .sort((a, b) => b.score - a.score);

      if (!scored.length) return ["진로탐색/정보제공"];
      return scored.slice(0, 3).map((x) => x.key);
    }

    function emotionScore(text) {
      let pos = 0;
      let neg = 0;

      for (const w of POSITIVE) {
        if (includesStem(text, w)) pos += 1;
      }
      for (const w of NEGATIVE) {
        if (includesStem(text, w)) neg += 1;
      }

      const score = Math.max(0, Math.min(100, 45 + neg * 10 - pos * 7));
      let level = "안정";
      let cls = "low";

      if (score >= 65) {
        level = "불안 높음";
        cls = "high";
      } else if (score >= 40) {
        level = "보통";
        cls = "mid";
      }

      return { score, level, cls };
    }

    function summarize(text) {
      const sentences = splitSentences(text);
      if (!sentences.length) return [];

      const ranked = sentences.map((sentence, idx) => {
        let score = 0;
        for (const group of TOPIC_RULES) {
          for (const w of group.words) {
            if (includesStem(sentence, w)) score += 2;
          }
        }
        for (const w of NEGATIVE) {
          if (includesStem(sentence, w)) score += 1.5;
        }
        return { idx, sentence, score };
      })
      .sort((a, b) => b.score - a.score)
      .slice(0, 4)
      .sort((a, b) => a.idx - b.idx)
      .map((x) => x.sentence);

      return ranked;
    }

    function buildJournal(text, topics, emotion, needs, summaryLines) {
      const topicText = topics.length ? topics.map((t) => t.key).join(", ") : "핵심 토픽 탐지 제한";
      const needsText = needs.join(", ");
      const summaryText = summaryLines.length ? summaryLines.map((s) => `- ${s}`).join("\n") : "- 요약 근거 문장 부족";

      return [
        "[직업상담 자동 일지 초안]",
        `- 상담일자: ${ids.sessionDate.value || todayLocal()}`,
        `- 내담자 코드: ${ids.clientCode.value.trim() || "미기재"}`,
        "",
        "1) 주요 진술 요약",
        `${summaryLines[0] || "구직/진로 관련 어려움과 지원 필요를 표현함."}`,
        "",
        "2) AI 분석 결과",
        `- 주요 진로 토픽: ${topicText}`,
        `- 불안도/감정 상태: ${emotion.level} (${emotion.score}/100)`,
        `- 지원 니즈: ${needsText}`,
        "",
        "3) 상담자 참고 계획",
        "- 단기: 우선순위 직무 2개를 기준으로 요구역량/진입경로 비교",
        "- 중기: 이력서/면접/직업훈련 연계 등 실행 과제 설정",
        "- 필요시: 정서안정 지원 및 후속 상담 연계",
        "",
        "4) 핵심 근거 문장",
        summaryText,
        "",
        "[검토 필요] 자동 생성 결과는 초안이며, 최종 기록 전 상담자가 반드시 수정·확정해야 합니다."
      ].join("\n");
    }

    function renderAnalysis(text) {
      const topics = pickTopics(text);
      const needs = pickNeeds(text);
      const emotion = emotionScore(text);
      const summaryLines = summarize(text);

      ids.topicOut.value = topics.length
        ? topics.map((t, i) => `${i + 1}. ${t.key} (신호 ${t.score})`).join("\n")
        : "탐지된 주요 토픽이 없습니다.";

      ids.emotionOut.value = `${emotion.level} (${emotion.score}/100)\n근거: 부정 정서 표현 빈도와 진로갈등 표현을 기준으로 추정`;
      ids.anxietyBadge.innerHTML = `<span class="pill ${emotion.cls}">${emotion.level}</span>`;

      ids.needsOut.value = needs.map((n, i) => `${i + 1}. ${n}`).join("\n");
      ids.journalOut.value = buildJournal(text, topics, emotion, needs, summaryLines);
    }

    async function getAsr() {
      if (!asrPromise) {
        setStatus("음성모델 로딩 중 (최초 1회)");
        asrPromise = pipeline("automatic-speech-recognition", "Xenova/whisper-tiny");
      }
      return asrPromise;
    }

    async function toMonoFloat32(audioBuffer) {
      const channels = audioBuffer.numberOfChannels;
      const length = audioBuffer.length;
      const out = new Float32Array(length);

      for (let c = 0; c < channels; c += 1) {
        const channelData = audioBuffer.getChannelData(c);
        for (let i = 0; i < length; i += 1) {
          out[i] += channelData[i] / channels;
        }
      }

      return out;
    }

    async function resampleTo16k(floatData, sourceRate) {
      if (sourceRate === 16000) return floatData;

      const duration = floatData.length / sourceRate;
      const targetLength = Math.ceil(duration * 16000);
      const offline = new OfflineAudioContext(1, targetLength, 16000);
      const buffer = offline.createBuffer(1, floatData.length, sourceRate);
      buffer.copyToChannel(floatData, 0);

      const source = offline.createBufferSource();
      source.buffer = buffer;
      source.connect(offline.destination);
      source.start(0);

      const rendered = await offline.startRendering();
      return rendered.getChannelData(0);
    }

    async function transcribeBlob(blob) {
      setStatus("음성 디코딩 중");
      const arrayBuffer = await blob.arrayBuffer();
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const decoded = await audioContext.decodeAudioData(arrayBuffer.slice(0));
      const mono = await toMonoFloat32(decoded);
      const pcm16 = await resampleTo16k(mono, decoded.sampleRate);

      setStatus("음성 텍스트 변환 중");
      const asr = await getAsr();
      const result = await asr(pcm16, {
        language: "korean",
        task: "transcribe",
        chunk_length_s: 25,
        stride_length_s: 5
      });

      return typeof result === "string" ? result : result.text;
    }

    async function analyzeAudioFile(file) {
      try {
        if (!file) return;
        setStatus(`파일 분석 시작: ${file.name}`);
        const text = (await transcribeBlob(file)).trim();
        ids.transcript.value = text;
        renderAnalysis(text);
        setStatus("분석 완료");
      } catch (error) {
        console.error(error);
        setStatus("오류: 음성 분석 실패. 브라우저 지원 형식인지 확인하세요.");
        alert("음성 분석 중 오류가 발생했습니다. 다른 형식(wav/mp3)으로 다시 시도해주세요.");
      }
    }

    async function startRecording() {
      try {
        recordStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordChunks = [];
        recorder = new MediaRecorder(recordStream);

        recorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) recordChunks.push(event.data);
        };

        recorder.onstop = async () => {
          const blob = new Blob(recordChunks, { type: recorder.mimeType || "audio/webm" });
          recordStream.getTracks().forEach((t) => t.stop());
          setStatus("녹음 종료, 분석 중");
          await analyzeAudioFile(blob);
        };

        recorder.start();
        isRecording = true;
        ids.recordBtn.textContent = "실시간 녹음 종료 후 분석";
        setStatus("실시간 녹음 중");
      } catch (error) {
        console.error(error);
        setStatus("오류: 마이크 권한 또는 녹음 기능을 확인하세요.");
        alert("마이크 접근 권한이 필요합니다.");
      }
    }

    function stopRecording() {
      if (!recorder || recorder.state !== "recording") return;
      recorder.stop();
      isRecording = false;
      ids.recordBtn.textContent = "실시간 녹음 시작";
    }

    function resetAll() {
      ids.sessionDate.value = todayLocal();
      ids.clientCode.value = "";
      ids.transcript.value = "";
      ids.topicOut.value = "";
      ids.emotionOut.value = "";
      ids.needsOut.value = "";
      ids.journalOut.value = "";
      ids.anxietyBadge.textContent = "";
      setStatus("대기 중");
    }

    function sampleText() {
      ids.transcript.value = "요즘 경력전환을 고민하고 있는데 어떤 직종으로 지원해야 할지 결정이 어렵습니다. 데이터 관련 업무에 관심이 있지만 실무 경험이 부족해서 자신이 없습니다. 면접 준비와 이력서 작성도 막막하고, 당장 생계 때문에 빠른 취업이 필요해서 불안감이 큽니다. 직업훈련 과정과 채용 연계 정보를 함께 안내받고 싶습니다.";
      renderAnalysis(ids.transcript.value);
      setStatus("샘플 텍스트 분석 완료");
    }

    async function copyJournal() {
      const text = ids.journalOut.value.trim();
      if (!text) return;
      await navigator.clipboard.writeText(text);
      alert("상담 일지 요약문을 복사했습니다.");
    }

    function downloadJournal() {
      const text = ids.journalOut.value.trim();
      if (!text) return;
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = (ids.sessionDate.value || todayLocal()).replaceAll("-", "");
      a.href = url;
      a.download = `job-counsel-log-${stamp}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function printPdf() {
      window.print();
    }

    ids.uploadBtn.addEventListener("click", () => ids.audioFile.click());
    ids.audioFile.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      await analyzeAudioFile(file);
      ids.audioFile.value = "";
    });

    ids.recordBtn.addEventListener("click", async () => {
      if (!isRecording) {
        await startRecording();
      } else {
        stopRecording();
      }
    });

    ids.reanalyzeBtn.addEventListener("click", () => {
      const text = ids.transcript.value.trim();
      if (!text) {
        alert("재분석할 텍스트가 없습니다.");
        return;
      }
      renderAnalysis(text);
      setStatus("텍스트 재분석 완료");
    });

    ids.sampleBtn.addEventListener("click", sampleText);
    ids.resetBtn.addEventListener("click", resetAll);
    ids.copyBtn.addEventListener("click", copyJournal);
    ids.downloadBtn.addEventListener("click", downloadJournal);
    ids.printBtn.addEventListener("click", printPdf);

    resetAll();
  </script>
</body>
</html>
